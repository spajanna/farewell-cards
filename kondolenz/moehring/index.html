<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta name="googlebot" content="noindex, nofollow">
<title>In Erinnerung an Martin Möhring</title>
<style>
  :root {
    --bg: #e8e0d4;
    --surface: #f7f3ee;
    --surface-white: #ffffff;
    --surface2: #dfd7ca;
    --border: #cfc6b8;
    --text: #2c2520;
    --muted: #7a6f65;
    --accent: #E42726;
    --gold: #8a6f3e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Georgia', 'Times New Roman', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .top-bar { height: 4px; background: var(--accent); width: 100%; }

  /* ── School header ── */
  .school-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 1.5rem 1rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface-white);
  }
  .school-logo { width: 140px; margin-bottom: 0.25rem; }

  /* ── Candle ── */
  .candle-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2.5rem 1.5rem 1rem;
    background: var(--bg);
  }
  .candle-wrap { position: relative; width: 60px; margin-bottom: 1.5rem; }
  .candle-body {
    width: 26px; height: 75px;
    background: linear-gradient(to right, #f0e0b0, #fff8e7, #f5e8c0, #f0e0b0);
    border-radius: 3px 3px 2px 2px;
    margin: 0 auto;
    box-shadow: 2px 2px 8px rgba(0,0,0,0.12), inset -3px 0 6px rgba(0,0,0,0.08);
    position: relative;
  }
  .candle-drip {
    position: absolute;
    top: -4px; left: 8px;
    width: 6px; height: 8px;
    background: #fff8e7;
    border-radius: 0 0 4px 4px;
  }
  .wick { width: 2px; height: 10px; background: #555; margin: 0 auto; border-radius: 1px; }
  .flame { width: 16px; height: 26px; margin: 0 auto -2px; position: relative; }
  .flame-inner {
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 10px; height: 20px;
    background: radial-gradient(ellipse at 50% 80%, #fff 0%, #ffe066 35%, #ffaa00 65%, transparent 100%);
    border-radius: 50% 50% 30% 30%;
    animation: flicker 2.1s ease-in-out infinite alternate;
    filter: blur(0.4px);
  }
  .flame-outer {
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 16px; height: 26px;
    background: radial-gradient(ellipse at 50% 80%, rgba(255,160,0,0.55) 0%, rgba(228,39,38,0.2) 60%, transparent 100%);
    border-radius: 50% 50% 30% 30%;
    animation: flicker 2.1s ease-in-out infinite alternate-reverse;
    filter: blur(1px);
  }
  .glow {
    position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
    width: 70px; height: 70px;
    background: radial-gradient(ellipse, rgba(255,180,50,0.22) 0%, transparent 70%);
    animation: glow-pulse 2.1s ease-in-out infinite alternate;
    pointer-events: none;
  }
  @keyframes flicker {
    0%   { transform: translateX(-50%) scaleX(1) scaleY(1) rotate(-1deg); }
    30%  { transform: translateX(-50%) scaleX(0.94) scaleY(1.04) rotate(1.2deg); }
    60%  { transform: translateX(-50%) scaleX(1.03) scaleY(0.97) rotate(-0.5deg); }
    100% { transform: translateX(-50%) scaleX(0.97) scaleY(1.02) rotate(1deg); }
  }
  @keyframes glow-pulse {
    0%   { opacity: 0.5; transform: translateX(-50%) scale(0.88); }
    100% { opacity: 0.9; transform: translateX(-50%) scale(1.1); }
  }

  /* ── Header / Name ── */
  header {
    text-align: center;
    padding: 0 1.5rem 2rem;
    background: var(--bg);
  }
  .cross { font-size: 2rem; color: var(--accent); display: block; margin-bottom: 0.75rem; line-height: 1; }
  .rip-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.22em;
    color: var(--muted); margin-bottom: 0.75rem;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  h1 {
    font-size: clamp(1.7rem, 5vw, 2.5rem);
    font-weight: normal; color: var(--text);
    line-height: 1.3; margin-bottom: 1.5rem; letter-spacing: 0.02em;
  }
  .divider { width: 60px; height: 1px; background: var(--accent); margin: 0 auto 1.5rem; }
  .verse {
    max-width: 420px; margin: 0 auto;
    font-size: 0.95rem; line-height: 1.85;
    color: var(--muted); font-style: italic; text-align: center;
  }
  .verse cite {
    display: block; margin-top: 0.5rem; font-size: 11px; font-style: normal;
    letter-spacing: 0.08em; color: var(--accent);
    font-family: 'Segoe UI', system-ui, sans-serif;
  }

  /* ── Messages ── */
  .messages-section {
    padding: 2rem 1.5rem 5rem;
    max-width: 640px; margin: 0 auto;
    background: var(--bg);
  }
  .section-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em;
    color: var(--muted); margin-bottom: 1.5rem;
    display: flex; align-items: center; gap: 12px;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  .section-label::before, .section-label::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .message-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.25rem 1.5rem 1.25rem 1.75rem;
    margin-bottom: 12px;
    border-left: 3px solid var(--accent);
    border-top-left-radius: 0; border-bottom-left-radius: 0;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .message-card .msg-text {
    font-size: 0.97rem; line-height: 1.78;
    color: var(--text); margin-bottom: 0.65rem;
  }
  .message-card .msg-author {
    font-size: 12px; color: var(--muted); font-style: italic;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }

  /* ── Music button ── */
  .music-btn {
    position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 100;
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--surface-white);
    border: 1px solid var(--border);
    color: var(--muted); font-size: 17px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    transition: all .2s;
  }
  .music-btn.playing { border-color: var(--accent); color: var(--accent); box-shadow: 0 2px 12px rgba(228,39,38,0.18); }
  .music-btn:hover { background: var(--surface2); }

  /* ── Footer ── */
  footer {
    text-align: center; padding: 1.5rem 1rem;
    border-top: 1px solid var(--border);
    background: var(--surface-white);
    font-size: 11px; color: var(--muted);
    font-family: 'Segoe UI', system-ui, sans-serif; line-height: 1.7;
  }
  footer strong { color: var(--accent); font-weight: normal; }
  .bottom-bar { height: 3px; background: var(--accent); width: 100%; }
</style>
</head>
