<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auf Wiedersehen, Maria!</title>
<style>
  :root{--bg:#0d1117;--surface:#161b22;--surface2:#1c2333;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#f0c230;--subject1:#79c0ff;--subject2:#a5d6ff}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
  .circuit-bg{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.18}
  .music-btn{position:fixed;bottom:1.5rem;right:1.5rem;z-index:100;width:48px;height:48px;border-radius:50%;background:var(--surface2);border:1px solid var(--accent);color:var(--accent);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(240,194,48,.2);transition:background .2s,transform .2s}
  .music-btn:hover{background:rgba(240,194,48,.12);transform:scale(1.08)}
  .music-btn.muted{border-color:var(--border);color:var(--muted);box-shadow:none}
  header{position:relative;z-index:1;padding:3rem 1.5rem 2rem;text-align:center;border-bottom:1px solid var(--border)}
  .dept-badge{display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 14px;font-size:12px;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-bottom:1.5rem}
  .dept-badge svg{width:14px;height:14px}
  h1{font-size:clamp(2rem,6vw,3.2rem);font-weight:300;letter-spacing:-.02em;margin-bottom:.5rem}
  h1 span{color:var(--accent);font-weight:600}
  .subtitle{font-size:.95rem;color:var(--muted);margin-bottom:1.5rem}
  .subject-badges{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
  .badge{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid}
  .badge-deutsch{background:rgba(121,192,255,.08);border-color:rgba(121,192,255,.3);color:var(--subject1)}
  .badge-religion{background:rgba(165,214,255,.08);border-color:rgba(165,214,255,.3);color:var(--subject2)}
  .carousel-section{position:relative;z-index:1;padding:2.5rem 1.5rem;max-width:680px;margin:0 auto}
  .section-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin-bottom:1rem;display:flex;align-items:center;gap:8px}
  .section-label::after{content:'';flex:1;height:1px;background:var(--border)}
  .carousel-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem 2rem 1.5rem;min-height:200px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
  .carousel-card::before{content:'"';position:absolute;top:-10px;left:20px;font-size:100px;color:var(--accent);opacity:.12;font-family:Georgia,serif;line-height:1}
  .carousel-text{font-size:1.05rem;line-height:1.75;position:relative;z-index:1;transition:opacity .4s}
  .carousel-author{margin-top:1.5rem;display:flex;align-items:center;gap:10px}
  .author-avatar{width:32px;height:32px;border-radius:50%;background:var(--surface2);border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--accent);flex-shrink:0}
  .author-name{font-size:13px;color:var(--muted);font-style:italic}
  .carousel-controls{display:flex;align-items:center;justify-content:space-between;margin-top:1rem}
  .carousel-dots{display:flex;gap:6px}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:background .3s,width .3s}
  .dot.active{background:var(--accent);width:18px;border-radius:3px}
  .carousel-btns{display:flex;gap:8px}
  .ctrl-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:border-color .2s}
  .ctrl-btn:hover{border-color:var(--accent)}
  .progress-bar{height:2px;background:var(--border);border-radius:1px;margin-top:.75rem;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);border-radius:1px;transition:width .1s linear}
  .all-section{position:relative;z-index:1;padding:0 1.5rem 5rem;max-width:680px;margin:0 auto}
  .message-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:12px;border-left:3px solid var(--accent);border-top-left-radius:0;border-bottom-left-radius:0}
  .message-card .msg-text{font-size:.95rem;line-height:1.7;margin-bottom:.75rem}
  .message-card .msg-author{font-size:12px;color:var(--muted)}
  footer{position:relative;z-index:1;text-align:center;padding:1.5rem;border-top:1px solid var(--border);font-size:12px;color:var(--muted)}
  footer span{color:var(--accent)}
</style>
</head>
<body>
  <audio id="bg-music" src="Farewell to the Mountain.mp3" loop preload="auto"></audio>
<svg class="circuit-bg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">

<header>

  <h1>Auf Wiedersehen, <span>Maria</span></h1>

  <div class="subject-badges">

<script>
const messages = [
  {

    "message": "Liebe Maria, leider haben wir in diesem Schuljahr weniger Kontakt gehabt. Ich habe die Zeit mit dir sehr genossen, wir haben schöne Gespräche geführt, auch tiefgründigere, die mir in Erinnerung bleiben werden. Danke auch für deine kollegiale Zusammenarbeit. Ich wünsche dir und deiner Familie alles erdenklich Gute. Bleibt gesund!"
  },
  {
    "name": "Fabian G.",
    "message": "Liebe Maria. Wir sind uns zwar nicht oft über den Weg gelaufen, dennoch hast Du Deinen warmherzigen und freundlichen Geist in den gemeinsamen Klassen hinterlassen. Alles erdenklich Gute Dir. Privat und dienstlich."
  },
  {
    "name": "Klaus B.",
    "message": "Liebe Maria als Religionskollegen hatten wir viele interessante Gespräche auch zu deiner Dissertation. Ich denke, gerne an die Begegnungen mit Dir zurück. Danke auch für den Tipp damals zum Internetmobbing der Maurer. Ich habe dich stets als hilfsbereites und freundliches Wesen erlebt. Du wirst hier fehlen. Ich wünsche Dir das Beste an deiner \"Heimatschule\". Du wirst den Unterschied schnell feststellen. Alles Gute Klaus."
  },
  {
    "name": "Alex",
    "message": "Liebe Maria,\n\nich wollte mich bei dir für unsere gute Zusammenarbeit bedanken. Du hast die Deutschrefs. wirklich toll betreut und ich hätte gerne länger mit dir in der Lehrerausbildung zusammengearbeitet. Ich werde die langen Sprachnachrichten, die gemeinsamen Lehrproben und die Gespräche vermissen. Du bist eine klasse Lehrerin, eine tolle Kollegin und ein sehr liebevoller Mensch.\n\nBleib wie du bist!\nEs hat mir sehr sehr viel Spaß gemacht.\n\nLiebe Grüße\n\nAlex"
  },
  {
    "name": "Annika F.",
    "message": "Liebe Maria, ich wünsche dir von Herzen alles Liebe für deine Zukunft!"
  },
  {
    "name": "Matthias T.",
    "message": "Liebe Maria, mit deiner freundlichen Art und deiner Bereitschaft, Dich auf den Deutschunterricht \"auf Distanz\" einzulassen, hast Du maßgeblich dazu beigetragen, dass die Fachinformatiker als erster Bildungsgang unserer Schule regelmäßigen Distanzunterricht erleben durften. Eine Erfahrung die noch lange nachwirken wird und auf deren Grundlage sich nun weitere Bildungsgänge auf den Weg gemacht haben.  Vielen Dank auch für die vielen Samstage, an denen du unterrichtet hast. Meinen Respekt dafür, dass du in der 7. und 8. Stunde alleine pflichtbewusst deinen Unterricht gemacht hast, während ich Dich mit einem schlechten Gewissen in den freien Nachmittag entschwunden bin. Ich wünsche Dir für Deinen weiteren Weg nur das Beste und bleib so wie Du bist!"
  },
  {
    "name": "Sebastian",
    "message": "Liebe Maria,\nich wünsche Dir auf deiner neuen Schule einen super Start, tolle Arbeitsbedingungen, ein nettes Kollegium und alles sonstige, was es für dich zu einem angenehmen Arbeitsplatz machen lässt.\nMach es gut und man sieht sich im Leben immer zweimal ;-)"
  },
  {
    "name": "Thomas H.",
    "message": "Hallo Maria, \nich danke dir für deinen Einsatz im FHK - auch an Samstagen - und weiß noch gar nicht, wie die Lücke gefüllt werden soll, die du hinterlässt. \nAuch möchte ich dir für deine charmante Art und Persönlichkeit danken. Für einen Kollegen, in dem Fall mich, hattest du immer ein Lächeln und ein freundliches Wort übrig. Das weiß ich zu schätzen. (Bestimmt auch deinen neuen Kolleginnen und Kollegen.) \nAlles Gute an deiner neuen Schule wünscht \nThomas."
  },
  {
    "name": "Niko B.",
    "message": "Ach Maria,\n\njetzt ist die Zeit doch schon rum....\n\nDie gemeinsame Zeit in der Bauabteilung und vor allem unsere netten, lustigen und spontanen Gespräche im Flur oder vor Magdalenas Süßigkeitenschrank werden fehlen.\n\nAuch wenn dich die Zimmerer und Maurer manchmal kurz vor die Weißglut gebracht haben: Am Ende werden sie dich ganz sicher vermissen. Und wir sowieso. Du warst für alle eine nahbare, sympathische und empathische Kollegin und Lehrerin mit ganz viel Herz und Humor!\n\nUnd auch wenn du trotz meines wirklich gewaltigen Drucks nicht zu den Kollegiumsfeiern gekommen bist, werde ich dir das irgendwann verzeihen - aber das wird noch dauern!\n\nAn dieser komischen Schulform Giymnäsihum wünsche ich dir alles erdenklich Gute und genauso viel Spaß! Ich hoffe du bringst mir möglichst viele neue Maurer in die Klassen!"
  },
  {
    "name": "Magdalena",
    "message": "Mir fehlen die Worte, um ausdrücken zu können, wie sehr du mir fehlen wirst. Mit jeder Pause und jeder weiteren Kaffeetasse hast du mehr Platz in meinem Herzen eingenommen und ich bin mir sicher, dass Niko es nicht schaffen wird diesen statt deiner auszufüllen.  \nMit einem lachenden Auge, das dir die tollsten Erfahrungen wünscht und einem weinenden Auge, das dich vermissen wird, wünsche ich dir nur das Beste für deine Zukunft!\nSei ein Tiger...\nääähhh, neee\n.... ein Steinbock."
  },
  {
    "name": "Mark",
    "message": "Liebe Maria, du hast mit deiner warmherzigen Art und deinem offenen Wesen unsere Schule bereichert. Ich wünsche dir, dass du an deiner neuen Schule auf ein offenes Kollegium triffst, das dich herzlich aufnimmt."
  },
  {
    "name": "deine Zwillingsschwägerin",
    "message": "Liebe Zwillingsschwägerin,\nwer hätte gedacht, dass wir an der gleichen Schule landen – und uns trotzdem kaum über den Weg laufen? Irgendwie typisch für uns. Und doch weiß ich: Ich habe mitgefiebert, wenn du ungerecht behandelt wurdest. Ich habe innerlich gekämpft, wenn du gekämpft hast.\nDen Kassenwart – ja, das tut mir leid. Wirklich. Hätte ich geahnt, was damit alles einhergeht, hätte ich einfach geschwiegen. \nWas mich bis zum letzten Tag immer wieder zum Lachen gebracht hat? Dass unsere Kollegen uns einfach nicht auseinanderhalten konnten. Nach all den Jahren. Einfach unglaublich.\nIch werde dich so sehr vermissen. Aber ich freue mich für dich – von ganzem Herzen. Du gehst an einen Ort, wo du die Lehrerin sein kannst, zu der du ausgebildet wurdest. Wo du dich endlich entfalten kannst. Ein Neuanfang ist nicht immer leicht, aber ich weiß, dass er bei dir großartig sein wird.\nUnd auch wenn unsere Familie mit den Augen rollt – ich freue mich jetzt schon auf den Moment, wenn du fröhlich von deinen neuen Kollegen und Schülern berichten wirst.\nAlles Liebe, auf eine neue Ära – und auf uns."
  },
  {
    "name": "Gili H.",
    "message": "Liebe Maria, du als meine Freundin bist die Antwort auf meine Nöte. Du bist das Feld, das ich mit Liebe besäe und mit Dankbarkeit ernte. Und du bist mein Tisch und mein Herd. Denn ich komme zu dir mit meinem Hunger, und ich suche bei dir Frieden. Es bricht mir fast das Herz, dich gehen zu lassen. Du bist für mich so viel mehr als eine Kollegin – du bist eine wunderbare Freundin. Ich werde unsere gemeinsamen Pausen, den tiefen Austausch und das gemeinsame Nachdenken unglaublich vermissen. Danke für jedes Lachen auf dem Flur und jede feste Umarmung, die mir so oft den Tag gerettet hat. Ich werde deine Lücke hier jeden Tag spüren und dich schrecklich vermissen. Von Herzen alles Liebe für dich! Ich habe dich sehr lieb! Deine Gili"
  },
  {
    "name": "Michael N.",
    "message": "Liebe Maria, wir stehen heute hier, um dich schweren Herzens zu verabschieden. Du verlässt unsere Bauabteilung am Richard und wechselst ans Reismann. Wenn ich das mit den Begriffen unserer Handwerker beschreiben müsste: Du tauschst die zünftige Kluft gegen die feine Zwirn-Hose und den harten Beton gegen die Welt der Theorie. Als du damals zu uns in die Bauabteilung kamst, war das für beide Seiten eine spannende Aufgabe. Du bist von Haus aus Lehrerin für Deutsch und Religion. Man könnte sich fragen: Wie passt das zu Maurern, Zimmerern oder Fliesenlegern? Doch du hast uns allen gezeigt, wie perfekt das passt. Die Arbeit mit unseren Handwerkern erfordert nicht nur Fachwissen, sondern ein dickes Fell, eine klare Sprache und ein großes Herz. Genau das hast du vom ersten Tag an mitgebracht. \nDu hast dich in einer traditionell eher rauen Männerdomäne absolut behauptet. Unsere Handwerker haben schnell gemerkt: Bei Maria wird nicht nur geredet, sondern ein stabiles Fundament gegossen. In Deutsch hast du ihnen beigebracht, dass man nicht nur Wände, sondern auch Sätze fehlerfrei aufbauen muss. Und in Religion hast du bewiesen, dass auch Handwerker über Gott und die Welt nachdenken können. Du warst für unsere Abteilung ein echter Statik-Träger – verlässlich, belastbar und immer da, wenn es mal gebrannt hat. \n Nun zieht es dich ans Gymnasium. Damit du dort dein handwerkliches Geschick nicht verlernst, haben wir ein ganz besonderes Abschiedsgeschenk für dich vorbereitet. Es ist ein Bausatz für ein komplettes Modellhaus. Es besteht aus exakt 230 Teilen. Und weil wir aus der Bauabteilung kommen, haben wir dieses Geschenk für dich noch um drei ganz persönliche Werkzeuge erweitert, die perfekt zu dir passen: \n Zuerst legen wir dir diesen Zollstock dazu. Am Gymnasium wird vieles abstrakt in Notenpunkten gemessen. Dieser Zollstock soll dich daran erinnern, dass am Ende immer das reale, messbare Ergebnis zählt – Teil für Teil.\n Dazu kommt dieser Stein. Als Religionslehrerin weißt du, wie wichtig der sprichwörtliche Fels in der Brandung ist. Er steht für das Fundament, das du hier gelegt hast, und für die Mauern, die du im Kopf so manches sturen Azubis eingerissen hast.\n Und als Letztes: Ein Stück Holz. Holz arbeitet immer – genau wie du es getan hast. Es steht für die Flexibilität und die Wärme, die du in unser Kollegium gebracht hast.\n Wenn du also am Reismann in der reinen Theorie sitzt und die Sehnsucht nach uns zu groß wird, dann nimm dir diesen Bausatz mit seinen 230 Teilen vor und bau dir dein eigenes kleines Reich. \n Liebe Maria, im Namen der gesamten Bauabteilung möchte ich dir von ganzem Herzen für deinen unermüdlichen Einsatz danken. Du hinterlässt hier eine große Lücke. Für deinen Neuanfang wünschen wir dir nur das Beste. \n Und weil du unsere Religionslehrerin der Bauabteilung warst, möchte ich dir die wohl passendsten Worte unseres Berufsstandes mit auf den Weg geben: Gott segne das ehrbare Handwerk! \n Vielen Dank für alles, Maria, und alles Gute für deine Zukunft!"

let current=0,timer,progress=0;
function initials(n){return n.split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2)}
function renderDots(){document.getElementById('dots').innerHTML=messages.map((_,i)=>`<div class="dot${i===current?' active':''}"></div>`).join('')}
function showSlide(idx,animated=true){
  current=(idx+messages.length)%messages.length;
  const m=messages[current],txt=document.getElementById('carousel-text');
  if(animated)txt.style.opacity=0;
  setTimeout(()=>{txt.textContent=m.message;document.getElementById('carousel-author').textContent='— '+m.name;document.getElementById('carousel-avatar').textContent=initials(m.name);txt.style.opacity=1;txt.style.transition='opacity .4s'},animated?200:0);
  renderDots();
}
document.getElementById('btn-prev').addEventListener('click',()=>showSlide(current-1));
document.getElementById('btn-next').addEventListener('click',()=>showSlide(current+1));
const allDiv=document.getElementById('all-messages');
messages.forEach(m=>{allDiv.innerHTML+=`<div class="message-card"><p class="msg-text">${m.message}</p><span class="msg-author">— ${m.name}</span></div>`});
showSlide(0,false);

// ── Musik: ruhig & getragen (Pentatonik, Sinus, langsam) ────
const FREQS_MARIA=[261.63,293.66,329.63,392.00,440.00,392.00,329.63,261.63,
                   293.66,329.63,392.00,440.00,392.00,329.63,293.66,261.63];
const TEMPO_MARIA=1.1;
let ctx,masterGain,muted=false,musicStarted=false,loopTimeout;

function playNote(freq,startTime,duration){
  const osc=ctx.createOscillator(),g=ctx.createGain();
  osc.type='sine';osc.frequency.setValueAtTime(freq,startTime);
  g.gain.setValueAtTime(0,startTime);
  g.gain.linearRampToValueAtTime(0.4,startTime+0.08);
  g.gain.setValueAtTime(0.4,startTime+duration-0.1);
  g.gain.linearRampToValueAtTime(0,startTime+duration);
  osc.connect(g);g.connect(masterGain);
  osc.start(startTime);osc.stop(startTime+duration);
}
function scheduleMelody(){
  let t=ctx.currentTime+0.1;
  FREQS_MARIA.forEach(f=>{playNote(f,t,TEMPO_MARIA*0.8);t+=TEMPO_MARIA;});
  loopTimeout=setTimeout(scheduleMelody,(FREQS_MARIA.length*TEMPO_MARIA-0.3)*1000);
}
function startMusic(){
  const audio = document.getElementById('bg-music');
  audio.volume = 0.4;
  audio.play();
}
const btn=document.getElementById('music-btn');
btn.addEventListener('click',()=>{
  const audio = document.getElementById('bg-music');
  muted=!muted;
  audio.muted = muted;
  btn.classList.toggle('muted',muted);
  btn.textContent=muted?'🔇':'♪';
});
document.addEventListener('click',function autoStart(){
  document.getElementById('bg-music').play();
  document.removeEventListener('click',autoStart);
},{once:true});
</script>
